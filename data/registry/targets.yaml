targets:
  # ── personal (default 小爱) ──────────────────────────────────────
  # charm-coach 不纳入 — 与 coach/charm-tactics 重叠
  - profile: personal
    skill: tech-architect
    auto: false
    optimizer: gepa+aflow
    iterations: 10
    min_improvement_pct: 2.0
    hitl_required: true
    notes: "Shared tech-architect skill in personal profile. Manual trigger."

  - profile: personal
    skill: research
    auto: false
    optimizer: gepa+aflow
    iterations: 10
    min_improvement_pct: 2.0
    hitl_required: true

  - profile: personal
    skill: knowledge
    auto: false
    optimizer: gepa+aflow
    iterations: 10
    min_improvement_pct: 2.0
    hitl_required: true

  # ── coach ────────────────────────────────────────────────────────
  - profile: coach
    skill: charm-coach
    auto: true
    schedule: "0 2 * * 1"        # every Monday 2AM
    optimizer: gepa+aflow
    iterations: 10
    min_improvement_pct: 2.0
    hitl_required: true
    notes: "Renamed from charm-tactics 2026-05-23. Merged charm-playbook v2.1 + charm-tactics v4.0 → v5.0-unified. Baseline ~0.30."

  # ── architect ───────────────────────────────────────────────────
  - profile: architect
    skill: tech-architect
    auto: true
    schedule: "0 3 * * 1"        # every Monday 3AM
    optimizer: gepa+aflow
    iterations: 10
    min_improvement_pct: 2.0
    hitl_required: true
    notes: "Evolved 2026-05-23: baseline 0.347 → best 0.658 (+89.6%). Deployed."

  - profile: architect
    skill: software-development
    auto: false
