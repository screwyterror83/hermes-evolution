name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install lint deps
        run: pip install ruff pyyaml

      - name: Validate targets.yaml
        run: python -c "import yaml; d=yaml.safe_load(open('data/registry/targets.yaml')); print(f'targets.yaml OK: {len(d[\"targets\"])} targets')"

      - name: Lint runner.py
        run: ruff check code/runner.py code/evo_api/ --ignore E501

      - name: Lint evo_api
        run: ruff check code/evo_api/ --ignore E501

  build:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t gitea.nas/admin/hermes-evo:${{ github.sha }} \
                       -t gitea.nas/admin/hermes-evo:latest \
                       code/

      - name: Push to Gitea registry
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITEA_TOKEN }}" | docker login gitea.nas -u admin --password-stdin
          docker push gitea.nas/admin/hermes-evo:${{ github.sha }}
          docker push gitea.nas/admin/hermes-evo:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy evo-api to hermes-compose
        run: |
          ssh -o StrictHostKeyChecking=no nas \
            "cd /vol1/hermes-compose && \
             docker compose pull evo-api && \
             docker compose up -d evo-api"
