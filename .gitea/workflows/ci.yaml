name: Hermes Evolution CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: [shell]
    steps:
      - name: Checkout
        shell: bash
        run: |
          if [ -d "$GITHUB_WORKSPACE/.git" ]; then
            git -C "$GITHUB_WORKSPACE" fetch origin main --depth 2
            git -C "$GITHUB_WORKSPACE" reset --hard origin/main
          else
            git clone ssh://git@localhost:2222/admin/hermes-evolution.git "$GITHUB_WORKSPACE" --depth 2
          fi

      - name: Validate targets.yaml
        shell: bash
        run: |
          python3 -c "
          import yaml, sys
          d = yaml.safe_load(open('$GITHUB_WORKSPACE/data/registry/targets.yaml'))
          targets = d['targets']
          for t in targets:
              assert 'profile' in t and 'skill' in t and 'optimizer' in t, f'missing field: {t}'
          assert d.get('auto_promote_threshold'), 'missing auto_promote_threshold'
          print(f'targets.yaml OK — {len(targets)} targets')
          "

      - name: Validate gene files
        shell: bash
        run: |
          python3 -c "
          import json, pathlib, sys
          genes_dir = pathlib.Path('$GITHUB_WORKSPACE/data/genes')
          ok = 0
          for f in genes_dir.rglob('*.json'):
              d = json.loads(f.read_text())
              assert 'genes' in d, f'{f}: missing genes key'
              ok += 1
          print(f'Gene files OK — {ok} files validated')
          "

      - name: Validate scores.json
        shell: bash
        run: |
          python3 -c "
          import json
          scores = json.loads(open('$GITHUB_WORKSPACE/data/registry/scores.json').read())
          assert isinstance(scores, list), 'scores.json must be a list'
          for s in scores:
              assert 'run_id' in s and 'profile' in s and 'best' in s, f'bad entry: {s}'
          print(f'scores.json OK — {len(scores)} entries')
          "

      - name: Lint Python
        shell: bash
        run: |
          pip install -q ruff 2>/dev/null
          ruff check $GITHUB_WORKSPACE/code/ --ignore E501,E402,F401 --exit-zero

      - name: Validate aflow adapter imports
        shell: bash
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, '$GITHUB_WORKSPACE/code')
          from aflow_adapter.parse_skill import parse_skill_to_graph
          from aflow_adapter.render_skill import render_graph_to_skill, reorder_by_scores
          print('aflow_adapter OK')
          "

  build-and-deploy:
    runs-on: [shell]
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Pull latest code to /vol1/hermes-evolution
        shell: bash
        run: |
          git -C /vol1/hermes-evolution fetch gitea main --depth 2
          git -C /vol1/hermes-evolution reset --hard gitea/main
          echo "Code updated: $(git -C /vol1/hermes-evolution log --oneline -1)"

      - name: Build evo-api image
        shell: bash
        run: |
          cd /vol1/hermes-compose
          docker compose build evo-api
          echo "Build complete"

      - name: Deploy evo-api
        shell: bash
        run: |
          cd /vol1/hermes-compose
          docker compose up -d evo-api
          echo "Deploy triggered"

      - name: Smoke test
        shell: bash
        run: |
          for i in $(seq 1 10); do
            curl -sf http://localhost:8621/health && break
            echo "Waiting... ($i/10)"
            sleep 3
          done
          echo "Health check passed"
          TARGETS=$(curl -sf http://localhost:8621/targets | python3 -c "import json,sys; d=json.load(sys.stdin); print(len(d['targets']))")
          echo "Evolution targets: $TARGETS"
          SCORES=$(curl -sf http://localhost:8621/scores | python3 -c "import json,sys; print(len(json.load(sys.stdin)))")
          echo "Score history entries: $SCORES"
