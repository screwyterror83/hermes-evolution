name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install ruff pyyaml

      - name: Validate targets.yaml
        run: |
          python3 -c "
          import yaml
          d = yaml.safe_load(open('data/registry/targets.yaml'))
          targets = d['targets']
          for t in targets:
              assert 'profile' in t and 'skill' in t and 'optimizer' in t
          print(f'OK: {len(targets)} targets')
          "

      - name: Validate gene files
        run: |
          python3 -c "
          import json, pathlib
          for f in pathlib.Path('data/genes').rglob('*.json'):
              d = json.loads(f.read_text())
              assert 'genes' in d, f'{f}: missing genes key'
          print('Gene files OK')
          "

      - name: Lint
        run: ruff check code/ --ignore E501,E402,F401 --exit-zero

      - name: Validate aflow adapter
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'code')
          from aflow_adapter.parse_skill import parse_skill_to_graph
          from aflow_adapter.render_skill import render_graph_to_skill
          print('aflow_adapter imports OK')
          "
